name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      CI_CHUNK_SIZE: "1000"
      CI_CHUNK_NUM: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: Build all Arabic extensions
        run: chmod +x ./gradlew && ./gradlew -p src assembleDebug --no-daemon
      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: arabic-aniyomi-debug-apks
          path: src/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error
